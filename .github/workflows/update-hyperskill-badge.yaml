name: Update Hyperskill badge

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: "0.11.0"
          enable-cache: true

      - name: Run badge updater
        env:
          HYPERSKILL_USER_ID: "629688907"
          OUTPUT_FILE: ".github/badges/hyperskill.json"
        run: uv run .github/workflows/scripts/update_hyperskill_badge.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/hyperskill.json
          git commit -m "Update Hyperskill badge"
          git push
